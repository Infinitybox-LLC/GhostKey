; PlatformIO Project Configuration File
; REV2 - ESP32-S3-N16R8 (GhostKey pinout). Firmware logic matches v0.10.4-alpha.2 + REV2 GPIO only.

[env:esp32s3]
; Pin 6.x: Arduino-ESP32 2.x (ledcSetup/BLEDevice String APIs). Unpinned 53.x pulls Arduino 3.x and breaks ESP32 BLE Keyboard.
platform = espressif32@6.8.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.psram_type = opi
board_upload.flash_size = 16MB
lib_deps = 
	bblanchon/ArduinoJson @ ^6.21.3
	t-vk/ESP32 BLE Keyboard@^0.3.2
	https://github.com/Nickjgniklu/EM4095
build_flags = 
	-DCORE_DEBUG_LEVEL=2
	-DCONFIG_ARDUHAL_LOG_COLORS=1
